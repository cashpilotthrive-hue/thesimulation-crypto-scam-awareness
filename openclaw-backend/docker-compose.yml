version: '3.8'

services:
  openclaw-backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=openclaw-production-secret-change-me
      - DATABASE_PATH=/data/openclaw.db
      - FRONTEND_URL=https://openclaw.io
    volumes:
      - ./data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - openclaw-backend
    restart: always

volumes:
  data